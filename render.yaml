# Render Blueprint — deploys the FastAPI backend.
# In the Render dashboard: New > Blueprint > pick this repo.
services:
  - type: web
    name: vehicle-intelligence-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: FRONTEND_ORIGIN
        sync: false   # set to your Vercel URL in the dashboard
